<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ======================================================== -->
  <!-- 1. KUSTOMISASI TEKS DI TAB BROWSER                       -->
  <!-- ======================================================== -->
  <!-- Teks di bawah ini yang akan muncul di tab browser pengguna -->
  <title>SIGAP-CPAR | Pengadilan Agama Karawang</title>
  
  <!-- ======================================================== -->
  <!-- 2. KUSTOMISASI LOGO DI TAB BROWSER (FAVICON)             -->
  <!-- ======================================================== -->
  <!-- Ganti "logo-instansi.png" dengan nama file gambar Anda   -->
  <!-- yang sudah di-upload ke repository GitHub yang sama      -->
  <link rel="icon" type="image/png" href="UNBG-SIGAP CPAR.png">
  
  <!-- (Opsional) Icon khusus untuk perangkat Apple (iPhone/iPad) -->
  <link rel="apple-touch-icon" href="UNBG-SIGAP CPAR.png">

  <style>
    /* CSS untuk memastikan iframe menutupi 100% layar tanpa scrollbar ganda */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
      /* Warna latar ini akan terlihat sesaat sebelum form Google termuat */
      background-color: #f3f4f6; 
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
  </style>
</head>
<body>

  <!-- ======================================================== -->
  <!-- 3. MASUKKAN LINK GOOGLE APPS SCRIPT ANDA DI SINI         -->
  <!-- ======================================================== -->
  <!-- Ganti URL di dalam atribut src dengan link web app Anda  -->
  <iframe src="https://script.google.com/macros/s/AKfycbzHgYcoG2toa1PLFYptsxYDZyltm3nPrUpu4Gl5X5YiyjcenF_KB46WCLSIJ_9_PGgU/exec" 
          title="Formulir SIGAP-CPAR">
  </iframe>

</body>
</html>
